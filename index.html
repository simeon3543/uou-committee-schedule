<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>울산대학교 교원징계위원회 일정조사</title>
  <!-- 실제 앱(Apps Script 웹앱)으로 자동 연결 -->
  <meta http-equiv="refresh" content="1; url=https://script.google.com/macros/s/AKfycbyaVgJZ0JU9aaONakwn5CGCiJ8mOj5eV65tO286bn4Ae7RWWHR_EaIoJbFo14t9v7s/exec">
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css");
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', sans-serif; background: #1a1a1a; color: #fff;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .wrap { max-width: 420px; }
    .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #c9e0fc; margin-bottom: 12px; }
    h1 { font-size: 26px; font-weight: 600; line-height: 1.2; margin-bottom: 20px; }
    .spinner {
      width: 36px; height: 36px; margin: 0 auto 18px;
      border: 3px solid rgba(255,255,255,.2); border-top-color: #296ef9;
      border-radius: 9999px; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; color: #c2c2c2; line-height: 1.6; margin-bottom: 24px; }
    a.btn {
      display: inline-block; background: #024ad8; color: #fff; text-decoration: none;
      font-size: 15px; font-weight: 700; letter-spacing: .5px;
      padding: 14px 28px; border-radius: 4px;
    }
    a.btn:hover { background: #0e3191; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">울산대학교</div>
    <h1>교원징계위원회<br>일정조사</h1>
    <div class="spinner"></div>
    <p>응답 페이지로 이동 중입니다…<br>자동으로 넘어가지 않으면 아래 버튼을 눌러주세요.</p>
    <a class="btn" href="https://script.google.com/macros/s/AKfycbyaVgJZ0JU9aaONakwn5CGCiJ8mOj5eV65tO286bn4Ae7RWWHR_EaIoJbFo14t9v7s/exec">응답 페이지 열기</a>
  </div>
</body>
</html>
